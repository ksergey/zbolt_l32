Section "Monitor"
    Identifier "DSI-1"
    Option "Rotate" "inverted"
EndSection

Section "Screen"
    Identifier "Screen0"
    Monitor "DSI-1"
EndSection

Section "InputClass"
    Identifier "libinput touchscreen catchall"
    MatchIsTouchscreen "on"
    MatchDevicePath "/dev/input/event*"
    Driver "libinput"
    Option "TransformationMatrix" "-1 0 1 0 -1 1 0 0 1"
EndSection
